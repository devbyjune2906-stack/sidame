services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sidame}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sidame}
      AUTH_SECRET: ${AUTH_SECRET}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_NAMA: ${SEED_ADMIN_NAMA}
    ports:
      - "${APP_PORT:-8088}:3000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sidame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sidame}
    volumes:
      - sidame_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sidame} -d ${POSTGRES_DB:-sidame}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sidame_pgdata:
